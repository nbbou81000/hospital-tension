name: Tension Hospitalière FR/US
description: >
  Dashboard de tension hospitalière : taux d'occupation des lits (États-Unis, CDC NHSN)
  ou indicateur d'activité des urgences (France, Santé publique France / Odissé).
strategy: polling
polling_url: https://VOTRE-USER.github.io/hospital-tension/data.json
polling_headers: {}
polling_verb: get

custom_fields:
  - keyname: lang
    name: Langue de l'affichage / Display language
    field_type: select
    options:
      - label: Français
        value: fr
      - label: English
        value: en
    default: fr

  - keyname: country
    name: Pays
    field_type: select
    options:
      - label: France
        value: fr
      - label: États-Unis
        value: us
    default: fr

  - keyname: fr_region
    name: Région (France)
    field_type: select
    options:
      - label: Île-de-France
        value: "11"
      - label: Centre-Val de Loire
        value: "24"
      - label: Bourgogne-Franche-Comté
        value: "27"
      - label: Normandie
        value: "28"
