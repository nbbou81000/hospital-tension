name: Update hospital tension data

on:
  schedule:
    - cron: "0 6 * * *"   # tous les jours à 6h UTC (les données sources sont hebdo, ça suffit largement)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch data
        run: node fetch-data.js

      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet --cached || git commit -m "Update hospital tension data"
          git push
